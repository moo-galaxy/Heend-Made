<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heed Made | إدارة العملاء</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <h1>✨ Heend Made</h1>
                <p>Heendmade-Hand made jast for you 🪡</p>
            </div>
            <div class="header-stats" id="headerStats">
                <span>👥 العملاء: <strong id="totalCustomers">0</strong></span>
                <span>💰 إجمالي المبيعات: <strong id="totalSales">0 ج.م</strong></span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Add Customer Form -->
            <section class="form-section">
                <h2>➕ إضافة عميل جديد</h2>
                <form id="customerForm" class="customer-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="customerName">👤 الاسم الكامل</label>
                            <input type="text" id="customerName" placeholder="أدخل اسم العميل" required>
                        </div>
                        <div class="form-group">
                            <label for="customerPhone">📱 رقم الموبايل</label>
                            <input type="tel" id="customerPhone" placeholder="01xxxxxxxxx" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="customerAddress">📍 العنوان</label>
                            <input type="text" id="customerAddress" placeholder="العنوان بالتفصيل" required>
                        </div>
                        <div class="form-group">
                            <label for="productName">🎁 المنتج</label>
                            <input type="text" id="productName" placeholder="اسم المنتج" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="productPrice">💵 السعر (ج.م)</label>
                            <input type="number" id="productPrice" placeholder="سعر المنتج" min="0" step="0.01" required>
                        </div>
                        <div class="form-group">
                            <label for="purchaseDate">📅 تاريخ الشراء</label>
                            <input type="date" id="purchaseDate" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-add">
                        <span>إضافة العميل</span>
                        <span>✨</span>
                    </button>
                </form>
            </section>

            <!-- Search Section -->
            <section class="search-section">
                <h2>🔍 البحث في قاعدة البيانات</h2>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="ابحث بالاسم، رقم الهاتف، أو المنتج...">
                    <button id="searchBtn" class="btn-search">بحث</button>
                    <button id="clearSearch" class="btn-clear">مسح</button>
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">الكل</button>
                    <button class="filter-btn" data-filter="today">اليوم</button>
                    <button class="filter-btn" data-filter="week">هذا الأسبوع</button>
                    <button class="filter-btn" data-filter="month">هذا الشهر</button>
                </div>
            </section>

            <!-- Customers Table -->
            <section class="table-section">
                <div class="table-header">
                    <h2>📋 سجل العملاء</h2>
                    <button id="exportBtn" class="btn-export">📥 تصدير Excel</button>
                </div>
                <div class="table-wrapper">
                    <table id="customersTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>الاسم</th>
                                <th>رقم الهاتف</th>
                                <th>العنوان</th>
                                <th>المنتج</th>
                                <th>السعر</th>
                                <th>التاريخ</th>
                                <th>إجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody">
                            <!-- Data will be inserted here -->
                        </tbody>
                    </table>
                </div>
                <div class="no-data" id="noData" style="display: none;">
                    <p>🎨 لا يوجد عملاء حتى الآن</p>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2024 Heed Made - جميع الحقوق محفوظة | صنع بحب ❤️</p>
        </footer>
    </div>

    <!-- Loading Spinner -->
    <div id="loading" class="loading" style="display: none;">
        <div class="spinner"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
